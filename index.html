<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiales Challenge - Wiki Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .initials-gradient { background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl text-center">
        <h1 class="text-3xl font-800 mb-2">Initiales <span class="initials-gradient">Challenge</span></h1>
        <p class="text-slate-400 text-sm mb-6">Trouve une célébrité avec ces initiales</p>

        <div id="display-initials" class="text-7xl font-bold tracking-tighter mb-8 py-4 bg-slate-800/50 rounded-2xl">
            ??
        </div>

        <div class="flex justify-between mb-6 px-4">
            <div class="text-left">
                <p class="text-xs uppercase text-slate-500">Score</p>
                <p id="score" class="text-xl font-bold">0</p>
            </div>
            <div class="text-right">
                <p class="text-xs uppercase text-slate-500">Temps</p>
                <p id="timer" class="text-xl font-bold text-sky-400">15s</p>
            </div>
        </div>

        <div class="space-y-4">
            <input type="text" id="user-input" placeholder="Prénom Nom" 
                   class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all text-center text-lg">
            
            <button id="btn-action" onclick="handleAction()" 
                    class="w-full bg-sky-500 hover:bg-sky-400 text-white font-bold py-3 rounded-xl transition-all transform active:scale-95">
                GÉNÉRER
            </button>
        </div>

        <div id="feedback" class="mt-6 hidden">
            <div id="feedback-msg" class="text-sm font-medium mb-2"></div>
            <img id="wiki-img" src="" class="w-24 h-24 rounded-full mx-auto object-cover border-4 border-sky-500 hidden">
        </div>
    </div>

    <script>
        let currentInitials = "";
        let score = 0;
        let timer;
        let timeLeft = 120;
        let gameActive = false;

        const btn = document.getElementById('btn-action');
        const input = document.getElementById('user-input');
        const feedback = document.getElementById('feedback');
        const wikiImg = document.getElementById('wiki-img');

        function generateInitials() {
            const alphabet = "ABCDEFGHIJKLMNOPRST"; // On retire les lettres trop dures (X, Y, Z, Q...)
            const a = alphabet[Math.floor(Math.random() * alphabet.length)];
            const b = alphabet[Math.floor(Math.random() * alphabet.length)];
            currentInitials = a + b;
            document.getElementById('display-initials').innerText = `${a}.${b}`;
            
            // Reset UI
            input.value = "";
            input.focus();
            feedback.classList.add('hidden');
            wikiImg.classList.add('hidden');
            btn.innerText = "VÉRIFIER";
            
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 120;
            gameActive = true;
            document.getElementById('timer').innerText = timeLeft + "s";
            
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if (timeLeft <= 0) {
                    endGame("Temps écoulé !");
                }
            }, 1000);
        }
async function verifyAnswer() {
    const val = input.value.trim();
    if (val.length < 3) return;

    const parts = val.split(" ");
    if (parts.length < 2) {
        showFeedback("Il faut un Prénom et un Nom !", "text-yellow-400");
        return;
    }

    const firstChar = parts[0][0].toUpperCase();
    const lastChar = parts[parts.length - 1][0].toUpperCase();
    
    // On crée les deux combinaisons possibles
    const combo1 = firstChar + lastChar; // Prénom Nom
    const combo2 = lastChar + firstChar; // Nom Prénom

    // On vérifie si l'une des deux correspond aux initiales du jeu
    if (combo1 !== currentInitials && combo2 !== currentInitials) {
        showFeedback(`Les initiales ne correspondent pas !`, "text-red-400");
        return;
    }

    // ... reste du code pour l'appel API Wikipédia
}

            // Appel API Wikipédia
            btn.innerText = "Vérification...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(val)}`);
                const data = await response.json();

                if (data.type === "standard") {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    showFeedback(`Bravo ! C'est bien ${data.title}`, "text-green-400");
                    if (data.thumbnail) {
                        wikiImg.src = data.thumbnail.source;
                        wikiImg.classList.remove('hidden');
                    }
                    clearInterval(timer);
                    gameActive = false;
                    btn.innerText = "REJOUER";
                    btn.disabled = false;
                } else {
                    showFeedback("Inconnu sur Wikipédia...", "text-red-400");
                    btn.innerText = "VÉRIFIER";
                    btn.disabled = false;
                }
            } catch (e) {
                showFeedback("Erreur de connexion", "text-red-400");
                btn.disabled = false;
            }
        }

        function showFeedback(msg, colorClass) {
            feedback.classList.remove('hidden');
            const msgDiv = document.getElementById('feedback-msg');
            msgDiv.innerText = msg;
            msgDiv.className = `text-sm font-medium mb-2 ${colorClass}`;
        }

        function endGame(reason) {
            clearInterval(timer);
            gameActive = false;
            showFeedback(reason, "text-red-500 font-bold");
            btn.innerText = "RÉESSAYER";
        }

        function handleAction() {
            if (!gameActive) {
                generateInitials();
            } else {
                verifyAnswer();
            }
        }

        // Permettre de valider avec la touche Entrée
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleAction();
        });
    </script>
</body>
</html>
