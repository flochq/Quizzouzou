<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiales Challenge - Wiki Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Bangers&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .initials-gradient { background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Styles pour l'animation de défaite */
        #gueze-overlay { font-family: 'Bangers', cursive; display: none; }
        .blink { animation: blinker 0.6s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .pop-in { animation: popIn 0.5s ease-out; }
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="gueze-overlay" class="fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center p-4 pop-in">
        <h2 class="text-red-600 text-8xl md:text-[12rem] font-bold tracking-wider blink text-center leading-none">
            T'ES TROP GUEZ
        </h2>
        <button onclick="hideGueze()" class="mt-12 bg-white text-black font-bold px-8 py-3 rounded-full hover:bg-slate-200 transition transform active:scale-95 text-xl">
            Retenter ma chance ?
        </button>
    </div>

    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl text-center">
        <h1 class="text-3xl font-800 mb-2">Initiales <span class="initials-gradient">Challenge</span></h1>
        <p class="text-slate-400 text-sm mb-6">Trouve une célébrité (Prénom Nom)</p>

        <div id="display-initials" class="text-7xl font-bold tracking-tighter mb-8 py-4 bg-slate-800/50 rounded-2xl">
            ??
        </div>

        <div class="flex justify-between mb-6 px-4">
            <div class="text-left">
                <p class="text-xs uppercase text-slate-500">Score</p>
                <p id="score" class="text-xl font-bold">0</p>
            </div>
            <div class="text-right">
                <p class="text-xs uppercase text-slate-500">Temps restant</p>
                <p id="timer" class="text-xl font-bold text-sky-400">2:00</p>
            </div>
        </div>

        <div class="space-y-4">
            <input type="text" id="user-input" placeholder="Ex: Jean Dujardin" 
                   class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all text-center text-lg">
            
            <button id="btn-action" onclick="handleAction()" 
                    class="w-full bg-sky-500 hover:bg-sky-400 text-white font-bold py-3 rounded-xl transition-all transform active:scale-95">
                COMMENCER LE JEU
            </button>
        </div>

        <div id="feedback" class="mt-6 hidden">
            <div id="feedback-msg" class="text-sm font-medium mb-2"></div>
            <img id="wiki-img" src="" class="w-24 h-24 rounded-full mx-auto object-cover border-4 border-sky-500 hidden">
        </div>
    </div>

    <script>
        let currentInitials = "";
        let score = 0;
        let timer;
        let timeLeft = 120; // 120 secondes
        let gameActive = false;

        const btn = document.getElementById('btn-action');
        const input = document.getElementById('user-input');
        const feedback = document.getElementById('feedback');
        const wikiImg = document.getElementById('wiki-img');
        const overlay = document.getElementById('gueze-overlay');

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function generateInitials() {
            const alphabet = "ABCDEFGHIJKLMNOPRST"; 
            const a = alphabet[Math.floor(Math.random() * alphabet.length)];
            const b = alphabet[Math.floor(Math.random() * alphabet.length)];
            currentInitials = a + b;
            document.getElementById('display-initials').innerText = `${a}.${b}`;
            
            input.value = "";
            input.focus();
            feedback.classList.add('hidden');
            wikiImg.classList.add('hidden');
            btn.innerText = "VÉRIFIER";
            
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 120;
            gameActive = true;
            document.getElementById('timer').innerText = formatTime(timeLeft);
            
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = formatTime(timeLeft);
                if (timeLeft <= 0) {
                    showGueze();
                }
            }, 1000);
        }

        async function verifyAnswer() {
            const val = input.value.trim();
            if (val.length < 3) return;

            const parts = val.split(" ");
            if (parts.length < 2) {
                showFeedback("Indiquez le prénom ET le nom !", "text-yellow-400");
                return;
            }

            const pInitial = parts[0][0].toUpperCase();
            const nInitial = parts[parts.length - 1][0].toUpperCase();
            
            const matchNormal = (pInitial + nInitial === currentInitials);
            const matchReverse = (nInitial + pInitial === currentInitials);

            if (!matchNormal && !matchReverse) {
                showFeedback(`Incohérent avec ${currentInitials}`, "text-red-400");
                return;
            }

            btn.innerText = "Recherche Wikipédia...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(val)}`);
                const data = await response.json();

                if (data.type === "standard") {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    showFeedback(`Correct ! C'est bien ${data.title}`, "text-green-400");
                    if (data.thumbnail) {
                        wikiImg.src = data.thumbnail.source;
                        wikiImg.classList.remove('hidden');
                    }
                    clearInterval(timer);
                    gameActive = false;
                    btn.innerText = "PROCHAINES INITIALES";
                    btn.disabled = false;
                } else {
                    showFeedback("Célébrité introuvable sur Wikipédia.", "text-red-400");
                    btn.innerText = "VÉRIFIER";
                    btn.disabled = false;
                }
            } catch (e) {
                showFeedback("Erreur réseau.", "text-red-400");
                btn.disabled = false;
            }
        }

        function showFeedback(msg, colorClass) {
            feedback.classList.remove('hidden');
            const msgDiv = document.getElementById('feedback-msg');
            msgDiv.innerText = msg;
            msgDiv.className = `text-sm font-medium mb-2 ${colorClass}`;
        }

        // Fonctions pour gérer l'animation de défaite
        function showGueze() {
            clearInterval(timer);
            gameActive = false;
            overlay.style.display = 'flex';
            input.blur(); // Enlever le focus du clavier
        }

        function hideGueze() {
            overlay.style.display = 'none';
            btn.innerText = "REJOUER";
            // Optionnel : reset le score si tu veux qu'ils recommencent à zéro
            // score = 0; document.getElementById('score').innerText = score;
        }

        function handleAction() {
            if (!gameActive) {
                generateInitials();
            } else {
                verifyAnswer();
            }
        }

        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleAction();
        });
    </script>
</body>
</html>
